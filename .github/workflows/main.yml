name: Android CI

# متى يتم تشغيل هذا البناء؟ (عند الرفع أو عمل Pull Request على فرع main)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب الكود من المستودع
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. إعداد بيئة الجافا (Java 17 هي الموصى بها حالياً لأندرويد)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. إعطاء صلاحية التنفيذ لملف gradlew (هذا هو السطر الذي يحل مشكلتك)
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 4. بناء التطبيق (نسخة Debug)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. (اختياري) رفع ملف الـ APK الناتج لتتمكن من تحميله من صفحة GitHub Actions
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
