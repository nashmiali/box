name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً من GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد Node.js (مطلوب لمشاريع Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. تثبيت الحزم (Dependencies)
      - name: Install dependencies
        run: npm install

      # 4. بناء تطبيق الويب
      - name: Build Web App
        run: npm run build

      # 5. إعداد Java 17 للأندرويد
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 6. إعداد Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. مزامنة تطبيق الويب مع مجلد الأندرويد
      - name: Sync Capacitor
        run: npx cap sync android

      # 8. إعطاء صلاحية التنفيذ لملف gradlew (لاحظ أننا حددنا مسار المجلد android)
      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x ./gradlew

      # 9. بناء تطبيق الأندرويد (APK)
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # 10. رفع ملف الـ APK لتتمكن من تحميله
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
